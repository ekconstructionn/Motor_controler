<!DOCTYPE html>
<html>
<head>
  <title>SUBI TECH</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('https://images.unsplash.com/photo-1500382017468-9049fed747ef') no-repeat center/cover;
      background-size: cover;
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background: linear-gradient(rgba(0,100,0,0.6), rgba(0,150,0,0.6));
      top: 0;
      left: 0;
    }

    /* Card style for login and motor control */
    .card {
      position: relative;
      background: rgba(255,255,255,0.9);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      width: 320px;
      max-width: 90%;
      z-index: 1;
      box-shadow: 0 10px 25px rgba(0,0,0,0.3);
    }

    h2 {
      color: #1b5e20;
      margin: 10px 0;
    }

    input {
      width: 90%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {
      padding: 12px;
      margin: 10px;
      border: none;
      border-radius: 30px;
      font-size: 16px;
      cursor: pointer;
      color: white;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.05);
    }

    /* Login buttons */
    .login-btn {
      background: #2e7d32;
      width: 50%;
    }

    .login-btn:hover {
      background: #1b5e20;
    }

    /* Motor buttons */
    .on {
      background: #2e7d32;
      width: 110px;
    }

    .off {
      background: #c62828;
      width: 110px;
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    #message {
      margin-top: 10px;
      font-weight: bold;
      font-size: 14px;
      color: red;
    }

    #status {
      margin-top: 15px;
      font-weight: bold;
    }

    /* Pipe */
    .pipe {
      position: absolute;
      top: 50%;
      left: 0;
      width: 100%;
      height: 8px;
      background: #444;
      z-index: 0;
      border-radius: 4px;
    }

    .water {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #00c6ff, #0072ff);
      transition: width 1s;
      border-radius: 4px;
    }

    /* Responsive */
    @media (max-width: 400px) {
      .card {
        width: 90%;
        padding: 20px;
      }

      input {
        width: 85%;
        font-size: 14px;
      }

      button.on, button.off {
        width: 45%;
        margin: 5px 2%;
        font-size: 14px;
      }

      button.login-btn {
        width: 60%;
      }

      .pipe {
        width: 90%;
        left: 5%;
        height: 6px;
      }

      .water {
        transition: width 0.5s;
      }

      h2 {
        font-size: 20px;
      }

      #status, #message {
        font-size: 14px;
      }
    }
  </style>
</head>

<body>

<!-- Login Card -->
<div class="card" id="loginCard">
  <h2>🌾 SUBI TECH Login</h2>
  <input type="email" id="email" placeholder="Email"><br>
  <input type="password" id="password" placeholder="Password"><br>
  <button class="login-btn" onclick="login()">Login</button>
  <p id="message"></p>
</div>

<!-- Motor Control Card (Hidden initially) -->
<div class="pipe" id="pipe" style="display:none;">
  <div class="water" id="waterBar"></div>
</div>

<div class="card" id="motorCard" style="display:none;">
  <h2>🌾 SUBI TECH</h2>
  <p>💧 MOTOR Control</p>

  <button id="onBtn" class="on" onclick="turnOn()">ON</button>
  <button id="offBtn" class="off" onclick="turnOff()">OFF</button>

  <p id="status">Status: Loading...</p>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyDG4dFxq-mxVU3EUz1DTYqQciYEF_5-Mn8",
  authDomain: "starter-a9d2e.firebaseapp.com",
  databaseURL: "https://starter-a9d2e-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "starter-a9d2e",
  storageBucket: "starter-a9d2e.firebasestorage.app",
  messagingSenderId: "654539148207",
  appId: "1:654539148207:web:adbab1bf79a896bc61fd5a",
  measurementId: "G-XWDSZ3XPBS"
};

  firebase.initializeApp(firebaseConfig);
  var db = firebase.database();

  // Demo login function
  function login() {
    var email = document.getElementById("email").value;
    var password = document.getElementById("password").value;
    var message = document.getElementById("message");

    if(email === "" || password === "") {
      message.innerText = "Please enter email and password";
      return;
    }

    // Demo credentials
    if(email === "admin@subitech.com" && password === "123456") {
      message.style.color = "green";
      message.innerText = "Login successful!";
      setTimeout(showMotorControl, 500);
    } else {
      message.style.color = "red";
      message.innerText = "Invalid email or password";
    }
  }

  // Show motor control and hide login
  function showMotorControl() {
    document.getElementById("loginCard").style.display = "none";
    document.getElementById("motorCard").style.display = "block";
    document.getElementById("pipe").style.display = "block";

    // Initialize motor state
    db.ref("motor").once("value").then((snap) => {
      if(!snap.exists()) db.ref("motor").set("OFF");
    });

    // Listen for changes
    db.ref("motor").on("value", function(snapshot) {
      let status = snapshot.val();
      document.getElementById("status").innerText = "Status: " + status;

      let onBtn = document.getElementById("onBtn");
      let offBtn = document.getElementById("offBtn");

      if(status === "ON") {
        document.getElementById("waterBar").style.width = "100%";
        onBtn.disabled = true;
        offBtn.disabled = false;
      } else {
        document.getElementById("waterBar").style.width = "0%";
        onBtn.disabled = false;
        offBtn.disabled = true;
      }
    });
  }

  function turnOn() {
    db.ref("motor").set("ON");
  }

  function turnOff() {
    db.ref("motor").set("OFF");
  }
</script>

</body>
</html>
